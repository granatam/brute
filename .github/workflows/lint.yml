on: [ 'push' ]

jobs:
  lint-c:
    runs-on: ubuntu-latest
    name: clang-tidy
    steps:
      - uses: actions/checkout@v3
      - name: install bear, clang-tidy and libevent
        run: |
          sudo apt-get update -y
          sudo apt-get install libevent-dev bear clang-tidy -y
      - name: build through bear to capture compile commands
        run: bear -- make -B
      - name: run clang-tidy
        run: |
          find src -type f \( -name '*.c' -o -name '*.h' \) -print0 |
            xargs -0 -n1 clang-tidy --quiet -p .
  check-format-c:
    runs-on: ubuntu-latest
    name: clang-format
    steps:
    - uses: actions/checkout@v3
    - uses: jidicula/clang-format-action@v4.11.0
      with:
        clang-format-version: '16'
        check-path: '.'
        exclude-regex: 'crypt'
  lint-python:
    runs-on: ubuntu-latest
    name: Ruff
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v3
        with:
          args: check .
      - uses: astral-sh/ruff-action@v3
        with:
          args: format --check .
